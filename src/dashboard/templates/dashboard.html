<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小柏 Agent - Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root {
  --bg: #f0f2f5;
  --card: #ffffff;
  --primary: #667eea;
  --primary-light: #eef2ff;
  --primary-dark: #5a67d8;
  --success: #10b981;
  --warning: #f59e0b;
  --danger: #ef4444;
  --text: #1e293b;
  --text2: #64748b;
  --text3: #94a3b8;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.06);
  --shadow-lg: 0 10px 40px rgba(0,0,0,.12);
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }

/* Header */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.header h1 { font-size: 1.6em; font-weight: 700; }
.header h1 span { background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.header .date { color: var(--text2); font-size: .9em; margin-top: 2px; }
.header .status { display: flex; align-items: center; gap: 6px; font-size: .85em; color: var(--success); }
.header .status::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Grid */
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.grid-full { grid-column: 1 / -1; }
@media(max-width:768px) { .grid { grid-template-columns: 1fr; } }

/* Card */
.card { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--border); transition: box-shadow .2s; }
.card:hover { box-shadow: var(--shadow-lg); }
.card-title { font-size: 1em; font-weight: 600; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.card-title .icon { font-size: 1.2em; }

/* Stats - clickable cards */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.stat { text-align: center; padding: 20px 10px; background: linear-gradient(135deg, #f8fafc, #f0f4ff); border-radius: 14px; transition: all .25s ease; cursor: pointer; border: 1px solid transparent; position: relative; overflow: hidden; }
.stat::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--primary), #764ba2); opacity: 0; transition: opacity .25s; }
.stat:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); border-color: var(--primary); }
.stat:hover::before { opacity: 1; }
.stat .icon-big { font-size: 1.6em; margin-bottom: 6px; }
.stat .num { font-size: 2.2em; font-weight: 800; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.1; }
.stat .label { font-size: .8em; color: var(--text2); margin-top: 6px; font-weight: 500; }
.stat .hint { font-size: .65em; color: var(--primary); margin-top: 4px; opacity: 0; transition: opacity .25s; }
.stat:hover .hint { opacity: 1; }
@media(max-width:600px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.5); z-index: 1000; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(4px); }
.modal-overlay.active { display: flex; }
.modal { background: var(--card); border-radius: var(--radius); width: 100%; max-width: 700px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: 0 25px 60px rgba(0,0,0,.2); animation: modalIn .25s ease; }
@keyframes modalIn { from { opacity: 0; transform: scale(.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-header h2 { font-size: 1.1em; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.modal-close { background: none; border: none; font-size: 1.4em; cursor: pointer; color: var(--text3); padding: 4px 8px; border-radius: 8px; transition: all .2s; }
.modal-close:hover { background: #fee2e2; color: var(--danger); }
.modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.modal-tabs { display: flex; gap: 8px; padding: 12px 24px 0; flex-shrink: 0; }
.modal-tab { padding: 6px 16px; border-radius: 8px; font-size: .85em; cursor: pointer; border: 1px solid var(--border); background: none; color: var(--text2); transition: all .2s; font-weight: 500; }
.modal-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
.modal-tab:hover:not(.active) { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }

/* Chart styles */
.chart-container { position: relative; width: 100%; margin-bottom: 20px; }
.chart-container canvas { width: 100% !important; }
.chart-section-title { font-size: .8em; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin: 16px 0 8px 0; padding-bottom: 4px; border-bottom: 1px dashed var(--border); }
.network-canvas { width: 100%; border-radius: 12px; border: 1px solid var(--border); background: #fafbfc; display: block; }

/* Detail list items */
.detail-item { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 8px; transition: all .2s; background: #fafafa; }
.detail-item:hover { border-color: var(--primary); box-shadow: 0 2px 8px rgba(102,126,234,.1); }
.detail-item .meta { font-size: .75em; color: var(--text3); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.detail-item .content { font-size: .9em; color: var(--text); line-height: 1.5; }
.detail-badge { font-size: .7em; padding: 2px 8px; border-radius: 8px; font-weight: 600; }
.badge-preference { background: #dbeafe; color: #1e40af; }
.badge-identity { background: #fce7f3; color: #9d174d; }
.badge-event { background: #d1fae5; color: #065f46; }
.badge-other { background: #f1f5f9; color: #475569; }
.badge-emotion { background: #fef3c7; color: #92400e; }
.badge-user { background: #ede9fe; color: #5b21b6; }
.badge-assistant { background: #d1fae5; color: #065f46; }
.detail-empty { text-align: center; color: var(--text3); padding: 40px; font-size: .9em; }
.detail-loading { text-align: center; padding: 40px; color: var(--text3); }
.detail-loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; margin-left: 8px; vertical-align: middle; }
@keyframes spin { to { transform: rotate(360deg); } }
.detail-footer { padding: 12px 24px; border-top: 1px solid var(--border); display: flex; justify-content: center; gap: 8px; flex-shrink: 0; }
.page-btn { padding: 6px 14px; border-radius: 8px; font-size: .85em; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--text2); transition: all .2s; }
.page-btn:hover:not(:disabled) { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.page-btn:disabled { opacity: .4; cursor: default; }
.page-info { font-size: .8em; color: var(--text3); display: flex; align-items: center; }

/* Tasks */
.day-selector { display: flex; align-items: center; justify-content: center; gap: 16px; margin-bottom: 14px; }
.day-nav { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 4px 12px; font-size: 1.1em; cursor: pointer; color: var(--text2); transition: all .2s; line-height: 1; }
.day-nav:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
.day-nav:disabled { opacity: .3; cursor: default; }
.day-label { font-weight: 600; font-size: .95em; color: var(--text); min-width: 140px; text-align: center; }
.task-section-title { font-size: .75em; color: var(--text3); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin: 12px 0 6px 0; padding-bottom: 4px; border-bottom: 1px dashed var(--border); }
.task-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 6px; transition: all .2s; background: #fafafa; }
.task-item:hover { border-color: var(--primary); box-shadow: var(--shadow); }
.task-item.done { background: #f0fdf4; border-color: #bbf7d0; }
.task-item.missed { background: #fff7ed; border-color: #fed7aa; }
.task-checkbox { width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all .2s; font-size: .7em; }
.task-checkbox:hover { border-color: var(--primary); }
.task-checkbox.checked { background: var(--success); border-color: var(--success); color: white; }
.task-info { flex: 1; min-width: 0; }
.task-title { font-size: .9em; font-weight: 500; color: var(--text); }
.task-item.done .task-title { text-decoration: line-through; color: var(--text3); }
.task-time { font-size: .75em; color: var(--text3); }
.task-badge { font-size: .65em; padding: 2px 8px; border-radius: 10px; font-weight: 600; flex-shrink: 0; }
.badge-builtin { background: #e0e7ff; color: #4338ca; }
.badge-done { background: #d1fae5; color: #065f46; }
.badge-pending { background: #fef3c7; color: #92400e; }
.badge-missed { background: #fee2e2; color: #991b1b; }

/* Upcoming */
.upcoming-list { display: flex; flex-direction: column; gap: 8px; }
.upcoming-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--border); background: linear-gradient(135deg, #f8fafc, #f0f4ff); transition: all .2s; }
.upcoming-item:hover { border-color: var(--primary); box-shadow: var(--shadow); }
.upcoming-date { font-size: .75em; font-weight: 600; color: var(--primary); background: var(--primary-light); padding: 4px 8px; border-radius: 8px; white-space: nowrap; }
.upcoming-info { flex: 1; }
.upcoming-title { font-size: .9em; font-weight: 500; color: var(--text); }
.upcoming-time { font-size: .75em; color: var(--text3); margin-top: 2px; }
.upcoming-countdown { font-size: .7em; padding: 3px 8px; border-radius: 8px; font-weight: 600; white-space: nowrap; }
.countdown-today { background: #fee2e2; color: #991b1b; }
.countdown-tomorrow { background: #fef3c7; color: #92400e; }
.countdown-later { background: #dbeafe; color: #1e40af; }

/* Emotion chart */
.emotion-chart { display: flex; flex-direction: column; gap: 10px; }
.emotion-row { display: flex; align-items: center; gap: 10px; }
.emotion-emoji { font-size: 1.4em; width: 36px; text-align: center; }
.emotion-bar-bg { flex: 1; height: 28px; background: #f1f5f9; border-radius: 14px; overflow: hidden; position: relative; }
.emotion-bar-fill { height: 100%; border-radius: 14px; display: flex; align-items: center; padding-left: 10px; color: white; font-size: .8em; font-weight: 600; transition: width .8s ease; min-width: fit-content; }
.emotion-count { font-size: .8em; color: var(--text3); width: 50px; text-align: right; }

/* Messages */
.message-list { max-height: 420px; overflow-y: auto; scrollbar-width: thin; }
.message { padding: 14px; margin: 8px 0; border-radius: 12px; border-left: 3px solid transparent; }
.message.user { background: #f8fafc; border-left-color: var(--primary); }
.message.assistant { background: #f0fdf4; border-left-color: var(--success); }
.message .role { font-weight: 600; font-size: .85em; display: flex; align-items: center; gap: 6px; }
.message .role .name { color: var(--text); }
.message .role .time { font-weight: 400; font-size: .8em; color: var(--text3); }
.message .content { margin-top: 6px; font-size: .9em; line-height: 1.6; color: var(--text2); word-break: break-word; }

/* Facts */
.facts-list { display: flex; flex-direction: column; gap: 8px; }
.fact-item { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; background: #fafafa; border-radius: 10px; border: 1px solid var(--border); }
.fact-type { font-size: .7em; padding: 2px 8px; border-radius: 8px; font-weight: 600; white-space: nowrap; }
.fact-type.preference { background: #dbeafe; color: #1e40af; }
.fact-type.identity { background: #fce7f3; color: #9d174d; }
.fact-type.event { background: #d1fae5; color: #065f46; }
.fact-type.other { background: #f1f5f9; color: #475569; }
.fact-content { font-size: .85em; color: var(--text2); line-height: 1.5; }

/* Phone */
.phone-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
.phone-app { padding: 10px; background: #fafafa; border-radius: 10px; text-align: center; border: 1px solid var(--border); }
.phone-app .app-name { font-size: .85em; font-weight: 600; color: var(--text); }
.phone-app .app-time { font-size: .75em; color: var(--text3); margin-top: 2px; }
.phone-app .app-bar { height: 4px; background: #e2e8f0; border-radius: 2px; margin-top: 6px; overflow: hidden; }
.phone-app .app-bar-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--primary), #764ba2); }

.empty { text-align: center; color: var(--text3); padding: 30px; font-size: .9em; }
.loading { text-align: center; padding: 30px; }
.loading::after { content: ''; display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .6s linear infinite; margin-left: 8px; vertical-align: middle; }
.refresh-btn { background: none; border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: .8em; color: var(--text2); cursor: pointer; transition: all .2s; }
.refresh-btn:hover { background: var(--primary-light); border-color: var(--primary); color: var(--primary); }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1><span>小柏 Agent</span> Dashboard</h1>
      <div class="date" id="current-date"></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="status">运行中</div>
      <button class="refresh-btn" onclick="location.reload()">刷新</button>
    </div>
  </div>

  <!-- 统计卡片 - 可点击 -->
  <div class="card" style="margin-bottom:16px">
    <div class="stats-row" id="stats">
      <div class="stat" onclick="openModal('conversations')">
        <div class="icon-big">💬</div>
        <div class="num" id="s-conv">-</div>
        <div class="label">对话总数</div>
        <div class="hint">点击查看 →</div>
      </div>
      <div class="stat" onclick="openModal('facts')">
        <div class="icon-big">🧠</div>
        <div class="num" id="s-facts">-</div>
        <div class="label">记忆事实</div>
        <div class="hint">点击查看 →</div>
      </div>
      <div class="stat" onclick="openModal('emotions')">
        <div class="icon-big">🎭</div>
        <div class="num" id="s-emo">-</div>
        <div class="label">情绪记录</div>
        <div class="hint">点击查看 →</div>
      </div>
      <div class="stat" onclick="openModal('associations')">
        <div class="icon-big">🔗</div>
        <div class="num" id="s-assoc">-</div>
        <div class="label">关联索引</div>
        <div class="hint">点击查看 →</div>
      </div>
    </div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-title"><span class="icon">📋</span>今日任务</div>
      <div class="day-selector">
        <button class="day-nav" id="day-prev" onclick="changeDay(-1)">◀</button>
        <div class="day-label" id="day-label"></div>
        <button class="day-nav" id="day-next" onclick="changeDay(1)">▶</button>
      </div>
      <div id="task-list"><div class="loading">加载中</div></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">🎭</span>情绪画像（近7天）</div>
      <div id="emotions"><div class="loading">加载中</div></div>
    </div>
  </div>

  <div class="card grid-full" style="margin-bottom:16px">
    <div class="card-title"><span class="icon">📌</span>即将到来的任务</div>
    <div id="upcoming-tasks"><div class="loading">加载中</div></div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-title"><span class="icon">🧠</span>记忆事实</div>
      <div id="facts"><div class="loading">加载中</div></div>
    </div>
    <div class="card">
      <div class="card-title"><span class="icon">📱</span>手机使用</div>
      <div id="phone"><div class="empty">暂无数据</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="icon">💬</span>最近对话</div>
    <div class="message-list" id="messages"><div class="loading">加载中</div></div>
  </div>
</div>

<!-- Modal 弹窗 -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">详情</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-tabs" id="modal-tabs"></div>
    <div class="modal-body" id="modal-body">
      <div class="detail-loading">加载中</div>
    </div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<script>
var now = new Date();
var weekdays = ['日','一','二','三','四','五','六'];
var h = now.getHours();
var greeting = h < 6 ? '凌晨好' : h < 9 ? '早上好' : h < 12 ? '上午好' : h < 14 ? '中午好' : h < 18 ? '下午好' : h < 22 ? '晚上好' : '夜深了';
document.getElementById('current-date').textContent = greeting + ' | ' + (now.getMonth()+1) + '月' + now.getDate() + '日 星期' + weekdays[now.getDay()];

function esc(s) { return s.split('&').join('&amp;').split('<').join('&lt;').split('>').join('&gt;'); }
function formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatDayLabel(d) {
  var today = new Date();
  var todayStr = formatDate(today);
  var dStr = formatDate(d);
  var yesterday = new Date(today); yesterday.setDate(yesterday.getDate() - 1);
  var tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate() + 1);
  var dayOfWeek = ' 周' + weekdays[d.getDay()];
  if (dStr === todayStr) return '今天 (' + (d.getMonth()+1) + '月' + d.getDate() + '日)' + dayOfWeek;
  if (dStr === formatDate(yesterday)) return '昨天 (' + (d.getMonth()+1) + '月' + d.getDate() + '日)' + dayOfWeek;
  if (dStr === formatDate(tomorrow)) return '明天 (' + (d.getMonth()+1) + '月' + d.getDate() + '日)' + dayOfWeek;
  return (d.getMonth()+1) + '月' + d.getDate() + '日' + dayOfWeek;
}

var currentDay = new Date(now);
currentDay.setHours(0,0,0,0);

function changeDay(delta) {
  currentDay.setDate(currentDay.getDate() + delta);
  loadTasks();
}

function toggleTask(taskId, currentStatus, btn) {
  var newStatus = currentStatus === 'done' ? 'pending' : 'done';
  fetch('/api/tasks/' + taskId + '/status?status=' + newStatus + '&_=' + Date.now(), { method: 'PUT', cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function() { loadTasks(); })
    .catch(function() { alert('更新失败'); });
}

function loadTasks() {
  var dateStr = formatDate(currentDay);
  document.getElementById('day-label').innerHTML = formatDayLabel(currentDay);
  var today = new Date(); today.setHours(0,0,0,0);
  document.getElementById('day-next').disabled = (currentDay >= today);
  var nowTime = now.getHours() * 60 + now.getMinutes();
  var isToday = (formatDate(currentDay) === formatDate(now));

  fetch('/api/tasks?date=' + dateStr + '&_=' + Date.now(), { cache: 'no-store' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var tasks = data.tasks || [];
      if (tasks.length === 0) {
        document.getElementById('task-list').innerHTML = '<div class="empty">暂无任务</div>';
        return;
      }
      var builtinTasks = [], userTasks = [];
      tasks.forEach(function(t) { if (t.type === 'builtin') builtinTasks.push(t); else userTasks.push(t); });
      var html = '';
      if (builtinTasks.length > 0) {
        html += '<div class="task-section-title">🔧 系统任务</div>';
        builtinTasks.forEach(function(t) { html += renderTask(t, isToday, nowTime); });
      }
      if (userTasks.length > 0) {
        html += '<div class="task-section-title">👤 我的任务</div>';
        userTasks.forEach(function(t) { html += renderTask(t, isToday, nowTime); });
      }
      document.getElementById('task-list').innerHTML = html;
    })
    .catch(function() { document.getElementById('task-list').innerHTML = '<div class="empty">加载失败</div>'; });
}

function renderTask(t, isToday, nowTime) {
  var isDone = t.status === 'done';
  var taskClass = isDone ? 'done' : '';
  var checkClass = isDone ? 'checked' : '';
  var checkIcon = isDone ? '✓' : '';
  var missedBadge = '', missedClass = '';
  if (!isDone && isToday && t.time) {
    var parts = t.time.split(':');
    var tMin = parseInt(parts[0]) * 60 + parseInt(parts[1]);
    if (tMin < nowTime - 60) { missedClass = 'missed'; missedBadge = '<span class="task-badge badge-missed">已过</span>'; }
  }
  var statusBadge = '';
  if (isDone) statusBadge = '<span class="task-badge badge-done">✓ 完成</span>';
  else if (missedClass) statusBadge = missedBadge;
  else if (t.time) statusBadge = '<span class="task-badge badge-pending">待做</span>';
  var typeBadge = t.type === 'builtin' ? '<span class="task-badge badge-builtin">系统</span>' : '<span class="task-badge badge-user">个人</span>';
  var timeDisplay = t.time ? '<span class="task-time">🕐 ' + esc(t.time) + '</span>' : '';
  var html = '<div class="task-item ' + taskClass + ' ' + missedClass + '">';
  html += '<div class="task-checkbox ' + checkClass + '" onclick="toggleTask(\'' + t.id + '\', \'' + t.status + '\', this)">' + checkIcon + '</div>';
  html += '<div class="task-info"><div class="task-title">' + esc(t.title) + '</div>';
  if (timeDisplay) html += timeDisplay;
  html += '</div>' + typeBadge + statusBadge + '</div>';
  return html;
}

fetch('/api/emotions/summary?days=7&_=' + Date.now(), { cache: 'no-store' }).then(function(r){return r.json()}).then(function(text){
  if(!text || text.indexOf('(') < 0) { document.getElementById('emotions').innerHTML = '<div class="empty">暂无情绪数据</div>'; return; }
  var lines = text.split('\n');
  var items = [];
  for(var i=0; i<lines.length; i++){
    var line = lines[i];
    var idx = line.indexOf(':');
    if(idx < 0) continue;
    var before = line.substring(0, idx).trim();
    var after = line.substring(idx+1).trim();
    var countMatch = after.match(/(\d+)/);
    var pctMatch = after.match(/\((\d+)%\)/);
    if(!countMatch || !pctMatch) continue;
    var emoji = before.replace(/[^\S]/g, '');
    var name = before.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}\u{FE00}-\u{FE0F}\u{200D}\u{20E3}]/gu, '').trim();
    items.push({emoji: emoji, name: name, count: parseInt(countMatch[1]), pct: parseInt(pctMatch[1])});
  }
  if(items.length===0) { document.getElementById('emotions').innerHTML = '<div class="empty">暂无情绪数据</div>'; return; }
  var colors = ['#667eea','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4'];
  var html = '<div class="emotion-chart">';
  for(var j=0; j<items.length; j++){
    var it = items[j]; var bg = colors[j % colors.length];
    html += '<div class="emotion-row"><div class="emotion-emoji">' + it.emoji + '</div>';
    html += '<div class="emotion-bar-bg"><div class="emotion-bar-fill" style="width:' + it.pct + '%;background:' + bg + '">' + it.name + '</div></div>';
    html += '<div class="emotion-count">' + it.count + '次</div></div>';
  }
  html += '</div>';
  document.getElementById('emotions').innerHTML = html;
}).catch(function(){ document.getElementById('emotions').innerHTML = '<div class="empty">暂无情绪数据</div>'; });

fetch('/api/tasks/upcoming?_=' + Date.now(), { cache: 'no-store' }).then(function(r){return r.json()}).then(function(d){
  var el = document.getElementById('upcoming-tasks');
  var tasks = d.tasks || [];
  if(tasks.length === 0) { el.innerHTML = '<div class="empty">暂无待办任务</div>'; return; }
  var now2 = new Date();
  var todayStr = formatDate(now2);
  var tomorrow = new Date(now2); tomorrow.setDate(tomorrow.getDate() + 1);
  var tomorrowStr = formatDate(tomorrow);
  var html = '<div class="upcoming-list">';
  for(var i = 0; i < tasks.length; i++){
    var t = tasks[i];
    var taskDate = t.date;
    var countdownClass = '', countdownText = '';
    if(taskDate === todayStr) {
      countdownClass = 'countdown-today';
      if(t.time) {
        var parts = t.time.split(':');
        var taskMin = parseInt(parts[0]) * 60 + parseInt(parts[1]);
        var nowMin = now2.getHours() * 60 + now2.getMinutes();
        var diff = taskMin - nowMin;
        if(diff > 0) countdownText = diff + '分钟后';
        else if(diff > -60) countdownText = '已开始';
        else countdownText = '已过' + Math.abs(diff) + '分钟';
      } else { countdownText = '今天'; }
    } else if(taskDate === tomorrowStr) {
      countdownClass = 'countdown-tomorrow'; countdownText = '明天';
    } else {
      countdownClass = 'countdown-later';
      var d2 = new Date(taskDate);
      var daysDiff = Math.ceil((d2 - now2) / (1000*60*60*24));
      countdownText = daysDiff + '天后';
    }
    var dateDisplay = taskDate.substring(5).replace('-', '/');
    html += '<div class="upcoming-item">';
    html += '<div class="upcoming-date">' + dateDisplay + '</div>';
    html += '<div class="upcoming-info"><div class="upcoming-title">' + esc(t.title) + '</div>';
    if(t.time) html += '<div class="upcoming-time">计划时间: ' + esc(t.time) + '</div>';
    html += '</div><div class="upcoming-countdown ' + countdownClass + '">' + countdownText + '</div></div>';
  }
  html += '</div>';
  el.innerHTML = html;
}).catch(function(){ document.getElementById('upcoming-tasks').innerHTML = '<div class="empty">加载失败</div>'; });

function destroyCharts() {
  for (var i = 0; i < modalState.chartInstances.length; i++) {
    if (modalState.chartInstances[i]) {
      modalState.chartInstances[i].destroy();
    }
  }
  modalState.chartInstances = [];
  if (modalState.networkAnimFrame) {
    cancelAnimationFrame(modalState.networkAnimFrame);
    modalState.networkAnimFrame = null;
  }
}

function openModal(type) {
  modalState.type = type;
  modalState.page = 0;
  modalState.activeTab = 'chart';
  destroyCharts();
  document.getElementById('modal-title').innerHTML = modalConfig[type].title;
  renderModalTabs();
  document.getElementById('modal-overlay').classList.add('active');
  loadModalData();
}

function closeModal() {
  destroyCharts();
  document.getElementById('modal-overlay').classList.remove('active');
}

function renderModalTabs() {
  var config = modalConfig[modalState.type];
  var tabsHtml = '';
  // Chart tab
  var chartActive = modalState.activeTab === 'chart' ? ' active' : '';
  tabsHtml += '<button class="modal-tab' + chartActive + '" onclick="switchTab(\'chart\')">' + config.chartTab.label + '</button>';
  // List tabs
  for (var i = 0; i < config.listTabs.length; i++) {
    var tab = config.listTabs[i];
    var active = modalState.activeTab === tab.key ? ' active' : '';
    tabsHtml += '<button class="modal-tab' + active + '" onclick="switchTab(\'' + tab.key + '\')">' + tab.label + '</button>';
  }
  document.getElementById('modal-tabs').innerHTML = tabsHtml;
}

function switchTab(key) {
  modalState.activeTab = key;
  modalState.page = 0;
  destroyCharts();
  renderModalTabs();
  loadModalData();
}

function loadModalData() {
  var body = document.getElementById('modal-body');
  var footer = document.getElementById('modal-footer');
  footer.innerHTML = '';

  if (modalState.activeTab === 'chart') {
    body.innerHTML = '<div class="detail-loading">加载图表数据</div>';
    loadChartView();
    return;
  }

  body.innerHTML = '<div class="detail-loading">加载中</div>';
  loadListView();
}

    html += '<div class="chart-section-title">📋 全部关联</div>';
    if (assocData.associations && assocData.associations.length > 0) {
      for (var i = 0; i < assocData.associations.length; i++) {
        html += renderDetailItem(assocData.associations[i], 'associations');
      }
    } else {
      html += '<div class="detail-empty">暂无关联数据</div>';
    }
    body.innerHTML = html;

    // Draw force-directed network graph
    renderForceGraph(graphData);
  });
}

function renderForceGraph(graphData) {
  var canvas = document.getElementById('network-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = 400;

  var nodes = graphData.nodes || [];
  var edges = graphData.edges || [];

  if (nodes.length === 0) {
    ctx.fillStyle = '#94a3b8';
    ctx.font = '14px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('暂无关联数据', canvas.width / 2, canvas.height / 2);
    return;
  }

  var W = canvas.width;
  var H = canvas.height;
  var cx = W / 2;
  var cy = H / 2;

  // Find max size for scaling
  var maxSize = 1;
  for (var i = 0; i < nodes.length; i++) {
    if (nodes[i].size > maxSize) maxSize = nodes[i].size;
  }

  // Initialize positions randomly around center
  var pos = {};
  for (var i = 0; i < nodes.length; i++) {
    pos[nodes[i].id] = {
      x: cx + (Math.random() - 0.5) * W * 0.6,
      y: cy + (Math.random() - 0.5) * H * 0.6,
      vx: 0,
      vy: 0,
      size: nodes[i].size || 1
    };
  }

  // Build edge index
  var nodeSet = {};
  for (var i = 0; i < nodes.length; i++) nodeSet[nodes[i].id] = true;

  // Force-directed simulation (200 iterations)
  var repulsion = 2000;
  var attraction = 0.01;
  var centering = 0.005;
  var damping = 0.9;
  var maxWeight = 1;
  for (var i = 0; i < edges.length; i++) {
    if (edges[i].weight > maxWeight) maxWeight = edges[i].weight;
  }

  for (var iter = 0; iter < 200; iter++) {
    // Repulsion between all pairs
    for (var i = 0; i < nodes.length; i++) {
      for (var j = i + 1; j < nodes.length; j++) {
        var a = pos[nodes[i].id];
        var b = pos[nodes[j].id];
        var dx = a.x - b.x;
        var dy = a.y - b.y;
        var dist = Math.sqrt(dx * dx + dy * dy) || 1;
        var force = repulsion / (dist * dist);
        var fx = (dx / dist) * force;
        var fy = (dy / dist) * force;
        a.vx += fx; a.vy += fy;
        b.vx -= fx; b.vy -= fy;
      }
    }
    // Attraction along edges
    for (var i = 0; i < edges.length; i++) {
      var e = edges[i];
      if (!pos[e.source] || !pos[e.target]) continue;
      var a = pos[e.source];
      var b = pos[e.target];
      var dx = b.x - a.x;
      var dy = b.y - a.y;
      var dist = Math.sqrt(dx * dx + dy * dy) || 1;
      var w = (e.weight || 1) / maxWeight;
      var force = dist * attraction * w;
      var fx = (dx / dist) * force;
      var fy = (dy / dist) * force;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;
    }
    // Centering force
    for (var i = 0; i < nodes.length; i++) {
      var a = pos[nodes[i].id];
      a.vx += (cx - a.x) * centering;
      a.vy += (cy - a.y) * centering;
    }
    // Apply velocities
    for (var i = 0; i < nodes.length; i++) {
      var a = pos[nodes[i].id];
      a.vx *= damping;
      a.vy *= damping;
      a.x += a.vx;
      a.y += a.vy;
      // Keep within bounds
      var r = 10 + (a.size / maxSize) * 20;
      a.x = Math.max(r, Math.min(W - r, a.x));
      a.y = Math.max(r, Math.min(H - r, a.y));
    }
  }

  // Render
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#fafbfc';
  ctx.fillRect(0, 0, W, H);

  // Draw edges
  for (var i = 0; i < edges.length; i++) {
    var e = edges[i];
    if (!pos[e.source] || !pos[e.target]) continue;
    var a = pos[e.source];
    var b = pos[e.target];
    var w = (e.weight || 1) / maxWeight;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.strokeStyle = 'rgba(102,126,234,' + (0.15 + w * 0.4) + ')';
    ctx.lineWidth = 1 + w * 3;
    ctx.stroke();
  }

  // Draw nodes
  for (var i = 0; i < nodes.length; i++) {
    var n = nodes[i];
    var p = pos[n.id];
    if (!p) continue;
    var r = 8 + (p.size / maxSize) * 22;
    var color = CHART_COLORS[i % CHART_COLORS.length];

    // Node circle
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label
    ctx.fillStyle = '#1e293b';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    var label = n.id.length > 10 ? n.id.substring(0, 10) + '…' : n.id;
    ctx.fillText(label, p.x, p.y + r + 4);
  }
}

// ========== List Views ==========

function loadListView() {
  var config = modalConfig[modalState.type];
  var tab = config.listTabs.find(function(t){ return t.key === modalState.activeTab; });
  if (!tab) {
    // fallback: use first list tab
    tab = config.listTabs[0];
  }
  var url = tab.api + (tab.api.indexOf('?') >= 0 ? '&' : '?') + 'limit=' + modalState.pageSize + '&offset=' + (modalState.page * modalState.pageSize) + '&_=' + Date.now();

  fetch(url, { cache: 'no-store' }).then(function(r){return r.json()}).then(function(d){
    var items = [];
    var total = 0;
    if(modalState.type === 'conversations') {
      items = d.messages || []; total = d.total || 0;
      if(tab.filter) items = items.filter(function(m){ return m.role === tab.filter; });
    } else if(modalState.type === 'facts') {
      items = d.facts || []; total = d.total || 0;
    } else if(modalState.type === 'emotions') {
      items = d.emotions || []; total = d.total || 0;
    } else if(modalState.type === 'associations') {
      items = d.associations || []; total = d.total || 0;
    }
    modalState.total = total;

    if(items.length === 0) {
      document.getElementById('modal-body').innerHTML = '<div class="detail-empty">暂无数据</div>';
      document.getElementById('modal-footer').innerHTML = '';
      return;
    }

    var html = '';
    for(var i=0; i<items.length; i++){
      html += renderDetailItem(items[i], modalState.type);
    }
    document.getElementById('modal-body').innerHTML = html;

    // Pagination
    var totalPages = Math.ceil(total / modalState.pageSize);
    if(totalPages > 1) {
      var fhtml = '';
      fhtml += '<button class="page-btn" onclick="goPage(-1)"' + (modalState.page <= 0 ? ' disabled' : '') + '>上一页</button>';
      fhtml += '<span class="page-info">' + (modalState.page + 1) + ' / ' + totalPages + '（共 ' + total + ' 条）</span>';
      fhtml += '<button class="page-btn" onclick="goPage(1)"' + (modalState.page >= totalPages - 1 ? ' disabled' : '') + '>下一页</button>';
      document.getElementById('modal-footer').innerHTML = fhtml;
    } else {
      document.getElementById('modal-footer').innerHTML = '<span class="page-info">共 ' + total + ' 条</span>';
    }
  }).catch(function(){
    document.getElementById('modal-body').innerHTML = '<div class="detail-empty">加载失败</div>';
  });
}

function goPage(delta) {
  modalState.page += delta;
  loadModalData();
}

function renderDetailItem(item, type) {
  var t = type || modalState.type;
  var html = '<div class="detail-item">';
  if(t === 'conversations') {
    var roleLabel = item.role === 'user' ? '👤 荣慧' : '🤖 小柏';
    var badgeClass = item.role === 'user' ? 'badge-user' : 'badge-assistant';
    var time = new Date(item.timestamp).toLocaleString('zh-CN');
    html += '<div class="meta"><span class="detail-badge ' + badgeClass + '">' + roleLabel + '</span><span>' + time + '</span></div>';
    html += '<div class="content">' + esc(item.content).substring(0, 200) + (item.content.length > 200 ? '...' : '') + '</div>';
  } else if(t === 'facts') {
    var typeMap = {preference:'🏷️ 偏好',identity:'👤 身份',event:'📅 事件',other:'📝 其他'};
    var typeClass = ['preference','identity','event'].indexOf(item.fact_type) >= 0 ? item.fact_type : 'other';
    var typeLabel = typeMap[item.fact_type] || item.fact_type;
    var time = item.updated_at ? new Date(item.updated_at).toLocaleString('zh-CN') : '';
    html += '<div class="meta"><span class="detail-badge badge-' + typeClass + '">' + typeLabel + '</span><span>' + time + '</span>';
    if(item.confidence < 1) html += '<span style="color:var(--warning)">置信度: ' + Math.round(item.confidence * 100) + '%</span>';
    html += '</div>';
    html += '<div class="content">' + esc(item.content) + '</div>';
  } else if(t === 'emotions') {
    var emoji = emotionEmojis[item.emotion] || '❓';
    var time = new Date(item.timestamp).toLocaleString('zh-CN');
    var intensity = Math.round((item.intensity || 0.5) * 100);
    html += '<div class="meta"><span class="detail-badge badge-emotion">' + emoji + ' ' + item.emotion + '</span>';
    html += '<span>强度: ' + intensity + '%</span><span>' + time + '</span></div>';
    if(item.context) html += '<div class="content">' + esc(item.context) + '</div>';
  } else if(t === 'associations') {
    html += '<div class="meta"><span class="detail-badge badge-other">关联</span>';
    html += '<span>强度: ' + Math.round((item.strength || 0) * 100) + '%</span></div>';
    html += '<div class="content">' + esc(item.source_type || '') + ' → ' + esc(item.target_type || '') + '</div>';
  }
  html += '</div>';
  return html;
}

// ESC to close modal
document.addEventListener('keydown', function(e) { if(e.key === 'Escape') closeModal(); });
