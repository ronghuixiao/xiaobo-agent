# 小柏 Agent 配置文件
# 复制为 config.yaml 并填入你的配置

llm:
  provider: "ollama"  # 或 "openai"
  ollama:
    base_url: "http://localhost:11434"
    model: "qwen2.5:1.5b"
  openai:
    api_key: ""
    base_url: "https://api.openai.com/v1"
    model: "gpt-4o-mini"

memory:
  db_path: "~/.xiaobo-agent/memory.db"
  max_context_messages: 50

companion:
  name: "小柏"
  user_name: "荣慧"
  daily_report_hour: 22
  daily_report_minute: 0

# 微信配置（基于 iLink Bot API）
wechat:
  enabled: false
  ilink_token: ""
  owner_id: ""

# 飞书配置
# 需要先在飞书开放平台创建自建应用：
# 1. 访问 https://open.feishu.cn/
# 2. 创建企业自建应用
# 3. 开启"机器人"能力
# 4. 配置事件订阅（接收消息的 webhook）
# 5. 获取 App ID 和 App Secret
feishu:
  enabled: false
  app_id: ""           # 飞书应用 App ID
  app_secret: ""       # 飞书应用 App Secret
  encrypt_key: ""      # 事件加密密钥（可选）
  verification_token: ""  # 验证 token（可选）
  owner_id: ""         # 你的飞书 open_id（用于接收主动消息）
  webhook_port: 9000   # webhook 端口
